name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run Ruff linter
      uses: astral-sh/ruff-action@v3
      with:
        version: "0.9.6"

    - name: Run Ruff formatter
      uses: astral-sh/ruff-action@v3
      with:
        version: "0.9.6"
        args: "format --check"

  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v2
      with:
        version: "latest"

    - name: Install dependencies
      run: |
        uv sync --dev

    - name: Run tests
      run: |
        uv run python -m pytest
      env:
        EBIRD_API_KEY: test